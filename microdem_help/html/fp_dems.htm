<p><b><font size="5">Floating Point DEMs</font></b></p>
<p>The program can manipulate floating point DEM grids.&nbsp; Previously, 
they were converted to integer, with an attempt to move to cm or dm 
vertical resolution.</p>
<p>You can also save reinterpolated DEMs in floating point.</p>
