<p>Button on the <font color="#FF0000" size="6"><font size="3"><a href="maptool.htm">Map Window
                Toolbar</a>.</font></font></p>
<p><img src="../images/newmap.gif" width="25" height="22">

same data set.
        You can use this map to show a different map <a href="map_disp_param.htm">Display Parameter</a>,
        or to show a subset of the area with the same parameter.</p>
