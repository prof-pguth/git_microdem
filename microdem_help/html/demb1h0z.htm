<h1 align="center">DTED File Conventions</h1>

<p>DTED comes in 1° by 1° cells named for the SW corner. </p>

<p>Specs for DTED are as follows: </p>

<table border="2">
    <tr>
        <td>Level 0 </td>
        <td>~900 meter</td>
        <td>30 arc seconds</td>
    </tr>
    <tr>
        <td>Level 1 </td>
        <td>~90 meter </td>
        <td>3 arc seconds</td>
    </tr>
    <tr>
        <td>Level 2 </td>
        <td>~30 meter </td>
        <td>1 arc second</td>
    </tr>
</table>
