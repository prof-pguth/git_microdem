<p><font size="5"><b>Circle Around</b></font></p>
<p>Option on the <a href="tbme3ncl.htm">View Menu</a>.&nbsp; This create a movie
as you circle 360 degrees around a point.&nbsp; You double click to select a
starting viewpoint, set the size of a view, and then pick the point the movie
circles around.</p>
