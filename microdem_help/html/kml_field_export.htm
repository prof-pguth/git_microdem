<h1>KML Export by Field</h1>
<p>Select by:</p>
<ul>
	<li><strong>   <a href="kml_export.htm">KML deliberate
      database export, </a>&nbsp;</strong><strong style="font-weight: 400">and 
	pick the field under &quot;Separate layers&quot;</strong></li>
	<li><a href="db_click_field.htm">Double click on field name</a>, and pick.</li>
</ul>
<p>Exports the database as a number of layers, which you can turn on/off in the 
KML viewer.</p>
